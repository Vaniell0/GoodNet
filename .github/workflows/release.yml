name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ─── Linux (Nix + patchelf portable bundle) ─────────────────────────────────

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Build with Nix
        run: nix build --print-build-logs

      - name: Bundle portable release
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          mkdir -p release/bin release/lib release/plugins/connectors release/plugins/handlers

          # Binary: use unwrapped if available (Nix wrapper), else plain
          if [ -f result/bin/.goodnet-wrapped ]; then
            cp result/bin/.goodnet-wrapped release/bin/goodnet
          else
            cp result/bin/goodnet release/bin/goodnet
          fi
          chmod +x release/bin/goodnet

          # Plugins
          if [ -d result/plugins ]; then
            cp -r result/plugins/* release/plugins/ 2>/dev/null || true
          fi

          # Extract shared libraries from Nix store
          ldd release/bin/goodnet | { grep '/nix/store/' || true; } | awk '{print $3}' | sort -u | while read -r lib; do
            [ -f "$lib" ] && cp "$lib" release/lib/
          done || true

          # Also grab plugin dependencies
          find release/plugins -name '*.so' -exec ldd {} \; 2>/dev/null \
            | { grep '/nix/store/' || true; } | awk '{print $3}' | sort -u | while read -r lib; do
            [ -f "$lib" ] && [ ! -f "release/lib/$(basename "$lib")" ] && cp "$lib" release/lib/
          done || true

          # Files from Nix store are read-only — make writable for patchelf
          chmod -R u+w release/

          # Patch RPATH using patchelf from nixpkgs
          nix shell nixpkgs#patchelf --command bash -c '
            set -euo pipefail

            # Binary
            patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 release/bin/goodnet
            patchelf --set-rpath '"'"'$ORIGIN/../lib'"'"' release/bin/goodnet

            # Shared libs
            find release/lib -name "*.so*" -exec patchelf --set-rpath '"'"'$ORIGIN'"'"' {} \; 2>/dev/null || true

            # Plugins
            find release/plugins -name "*.so" -exec patchelf --set-rpath '"'"'$ORIGIN/../../lib'"'"' {} \; 2>/dev/null || true
          '

          # Create run.sh wrapper
          printf '%s\n' '#!/usr/bin/env bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'export LD_LIBRARY_PATH="$SCRIPT_DIR/../lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"' \
            'export GOODNET_PLUGINS_DIR="$SCRIPT_DIR/../plugins"' \
            'exec "$SCRIPT_DIR/goodnet" "$@"' > release/bin/run.sh
          chmod +x release/bin/run.sh

          tar czf "goodnet-${TAG}-linux-x86_64.tar.gz" -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: goodnet-*-linux-x86_64.tar.gz

  # ─── GitHub Release ─────────────────────────────────────────────────────────

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-release

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            goodnet-*-linux-x86_64.tar.gz
          generate_release_notes: true
