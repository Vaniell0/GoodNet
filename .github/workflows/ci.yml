name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Build core + plugins (unit tests run in checkPhase)
        run: nix build --print-build-logs

      # ── Docker integration tests ──────────────────────────────────────────────

      - name: Build & load Docker image
        run: nix build .#docker --print-build-logs && docker load < result

      - name: Docker smoke test
        run: |
          docker run -d --name gn-smoke \
            goodnet-docker:latest --listen 9000 --exit-after 5 --no-color
          sleep 3
          RUNNING=$(docker inspect -f '{{.State.Running}}' gn-smoke)
          [ "$RUNNING" = "true" ] || (docker logs gn-smoke; exit 1)
          EXIT=$(docker wait gn-smoke)
          docker logs gn-smoke
          [ "$EXIT" = "0" ]
          docker rm gn-smoke
        timeout-minutes: 1

      - name: Docker integration test (two-node handshake)
        run: |
          docker network create gn-net

          docker run -d --name gn-srv --network gn-net \
            goodnet-docker:latest \
            --listen 9000 --exit-after 15 --no-color --exit-code
          sleep 3

          docker run --name gn-cli --network gn-net \
            goodnet-docker:latest \
            --target tcp://gn-srv:9000 --count 100 --size 1 --no-color --exit-code
          CLIENT=$?

          SERVER=$(docker wait gn-srv)
          echo "Client exit: $CLIENT, Server exit: $SERVER"
          docker logs gn-srv
          docker logs gn-cli

          [ "$CLIENT" = "0" ] && [ "$SERVER" = "0" ]

          docker rm -f gn-cli gn-srv
          docker network rm gn-net
        timeout-minutes: 2

      # ── Optional: relay test (non-blocking) ──────────────────────────────────

      - name: Docker relay test (three-node chain)
        continue-on-error: true
        run: |
          docker network create gn-relay

          docker run -d --name gn-a --network gn-relay \
            goodnet-docker:latest --listen 9000 --exit-after 20 --no-color --exit-code
          sleep 2

          docker run -d --name gn-b --network gn-relay \
            goodnet-docker:latest --target tcp://gn-a:9000 --listen 9001 --exit-after 20 --no-color --exit-code
          sleep 3

          docker run --name gn-c --network gn-relay \
            goodnet-docker:latest --target tcp://gn-b:9001 --count 50 --size 1 --no-color --exit-code
          CLIENT=$?

          A_EXIT=$(docker wait gn-a)
          B_EXIT=$(docker wait gn-b)

          echo "A=$A_EXIT B=$B_EXIT C=$CLIENT"
          docker logs gn-a
          docker logs gn-b
          docker logs gn-c

          [ "$CLIENT" = "0" ] && [ "$B_EXIT" = "0" ]

          docker rm -f gn-a gn-b gn-c
          docker network rm gn-relay
        timeout-minutes: 3
