name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build core + plugins (runs unit tests in check phase)
        run: nix build --print-build-logs

      - name: Run unit tests
        run: ./result/bin/unit_tests --gtest_output="xml:test_results.xml" || true