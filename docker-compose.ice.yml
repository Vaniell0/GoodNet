# docker-compose.ice.yml — ICE upgrade overlay
#
# Usage (overlay on top of base compose):
#   docker compose -f docker-compose.yml -f docker-compose.ice.yml \
#     up --abort-on-container-exit --exit-code-from node-b

services:
  node-a:
    command: ["--listen", "25565", "-j", "2", "--exit-after", "60", "--exit-code"]

  node-b:
    command:
      - "--target"
      - "tcp://172.20.0.10:25565"
      - "--size"
      - "1"
      - "--count"
      - "100"
      - "--ice-upgrade"
      - "-j"
      - "2"
      - "--exit-code"
